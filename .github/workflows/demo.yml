name: Regenerate README demo GIF

# Two triggers:
# 1. `workflow_dispatch` — manual re-runs with custom inputs.
# 2. `workflow_run` — auto-fires after a successful `Publish release` so the
#    demo GIF in the README stays in sync with the published version.
on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to record
        default: https://worldsight-weld.vercel.app/
        required: true
      viewport:
        description: Viewport (WxH)
        default: 1280x800
        required: true
      fps:
        description: Frames per second
        default: "12"
        required: true
      max-clicks:
        description: Max discovered elements to click per page
        default: "3"
        required: true
      max-pages:
        description: Max pages the tour visits (BFS, same-origin, 1 level deep)
        default: "3"
        required: true
      initial-wait:
        description: Seconds to hold after networkidle before first click
        default: "4"
        required: true
  workflow_run:
    workflows: ["Publish release (TestPyPI → PyPI → GitHub release)"]
    types: [completed]

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    # On `workflow_run` triggers, only regenerate if the upstream release
    # succeeded. `workflow_dispatch` runs unconditionally.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    # `inputs.*` is empty on `workflow_run` — fall back to the same defaults
    # exposed to `workflow_dispatch` so both trigger paths behave identically.
    env:
      URL: ${{ inputs.url || 'https://worldsight-weld.vercel.app/' }}
      VIEWPORT: ${{ inputs.viewport || '1280x800' }}
      FPS: ${{ inputs.fps || '12' }}
      MAX_CLICKS: ${{ inputs['max-clicks'] || '3' }}
      MAX_PAGES: ${{ inputs['max-pages'] || '3' }}
      INITIAL_WAIT: ${{ inputs['initial-wait'] || '4' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Explicit token so `git push` below uses the GITHUB_TOKEN + our
          # per-job contents:write permission, not any long-lived credential.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-Linux-${{ hashFiles('pyproject.toml') }}

      - name: Install Playwright chromium
        run: playwright install --with-deps chromium

      - name: Generate demo GIF
        run: |
          python scripts/generate_demo.py \
            --url "$URL" \
            --viewport "$VIEWPORT" \
            --fps "$FPS" \
            --max-clicks "$MAX_CLICKS" \
            --max-pages "$MAX_PAGES" \
            --initial-wait "$INITIAL_WAIT" \
            --keep-frames debug-frames \
            --out docs/demo.gif \
            --verbose

      - name: Show output size
        run: ls -lh docs/demo.gif

      - name: Upload debug frames
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-frames
          path: debug-frames/
          retention-days: 7

      - name: Commit regenerated GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/demo.gif
          if git diff --staged --quiet; then
            echo "docs/demo.gif is unchanged; nothing to commit."
          else
            git commit -m "chore(demo): refresh docs/demo.gif via demo workflow"
            git push
          fi
