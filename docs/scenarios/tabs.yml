# ARIA tab-widget tour — clicks through Overview → Details → Settings.
#
# Requires --var base_url (see docs/scenarios/spa.yml for the pattern).
# Selectors are wired for the built-in fixture site's `tabs.html`.

meta:
  name: "ARIA tabs"
  viewport: 1280x800
  fps: 12
  dwell: 1.0
  format: gif
  out: reel-tabs.gif

steps:
  - goto: "{{ base_url }}/tabs.html"
    wait: load
    label: "Open tabs"

  - click: "#tab-details"
    label: "Switch to Details"
    dwell: 1.5

  - click: "#tab-settings"
    label: "Switch to Settings"
    dwell: 1.5

  - click: "#tab-overview"
    label: "Back to Overview"
    dwell: 1.0
